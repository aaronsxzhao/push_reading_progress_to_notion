<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Heatmap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;--text:#24292f;--text-muted:#656d76;
  --cell-empty:#ebedf0;--cell-l1:#9be9a8;--cell-l2:#40c463;--cell-l3:#30a14e;--cell-l4:#216e39;
  --border:#d0d7de;--tooltip-bg:#24292f;--tooltip-text:#fff;
}
.dark{
  --bg:#0d1117;--text:#c9d1d9;--text-muted:#8b949e;
  --cell-empty:#161b22;--cell-l1:#0e4429;--cell-l2:#006d32;--cell-l3:#26a641;--cell-l4:#39d353;
  --border:#30363d;--tooltip-bg:#c9d1d9;--tooltip-text:#0d1117;
}
.blue{--cell-l1:#dbeafe;--cell-l2:#93c5fd;--cell-l3:#3b82f6;--cell-l4:#1d4ed8}
.dark.blue{--cell-l1:#1e3a5f;--cell-l2:#1d4ed8;--cell-l3:#3b82f6;--cell-l4:#60a5fa}
.purple{--cell-l1:#e9d5ff;--cell-l2:#c084fc;--cell-l3:#9333ea;--cell-l4:#6b21a8}
.dark.purple{--cell-l1:#3b0764;--cell-l2:#6b21a8;--cell-l3:#9333ea;--cell-l4:#c084fc}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;justify-content:center;align-items:flex-start;
  min-height:100vh;padding:16px;
}
.container{width:100%;max-width:880px}
.graph-wrapper{overflow-x:auto;padding-bottom:4px}
.graph{display:inline-block;position:relative}
svg text{fill:var(--text-muted);font-size:10px;font-family:inherit}
.tooltip{
  position:fixed;padding:6px 10px;border-radius:4px;font-size:12px;
  background:var(--tooltip-bg);color:var(--tooltip-text);
  pointer-events:none;opacity:0;transition:opacity .15s;
  white-space:nowrap;z-index:999;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.tooltip.show{opacity:1}
.stats{
  display:flex;flex-wrap:wrap;gap:20px;margin-top:12px;
  font-size:13px;color:var(--text-muted);
}
.stats .stat{display:flex;align-items:baseline;gap:4px}
.stats .val{font-weight:600;color:var(--text);font-size:15px}
.legend{
  display:flex;align-items:center;gap:4px;margin-top:10px;
  font-size:11px;color:var(--text-muted);justify-content:flex-end;
}
.legend-cell{width:11px;height:11px;border-radius:2px}
.loading{
  text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px;
}
.error{
  text-align:center;padding:40px 20px;color:#da3633;font-size:14px;
}
</style>
</head>
<body>
<div class="container">
  <div id="loading" class="loading">Loading reading data…</div>
  <div id="error" class="error" style="display:none"></div>
  <div id="content" style="display:none">
    <div class="graph-wrapper"><div class="graph" id="graph"></div></div>
    <div class="stats" id="stats"></div>
    <div class="legend" id="legend"></div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>

<script>
(function(){

const params = new URLSearchParams(location.search);
const theme = params.get('theme') || 'light';
const palette = params.get('colors') || 'green';
if(theme==='dark') document.body.classList.add('dark');
if(palette!=='green') document.body.classList.add(palette);

const CELL=11, GAP=3, STEP=CELL+GAP;
const DAY_LABELS=['','Mon','','Wed','','Fri',''];
const MONTH_NAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const LEVELS=[0, 60, 900, 1800, 3600]; // 0, 1m, 15m, 30m, 60m

function levelFor(secs){
  if(!secs||secs<=0) return 0;
  if(secs<LEVELS[2]) return 1;
  if(secs<LEVELS[3]) return 2;
  if(secs<LEVELS[4]) return 3;
  return 4;
}

function fmtTime(s){
  if(!s||s<=0) return 'No reading';
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60);
  if(h>0&&m>0) return h+'h '+m+'m';
  if(h>0) return h+'h';
  return m+'m';
}

function fmtDate(d){
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return days[d.getDay()]+', '+months[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
}

function dateKey(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'),
        dd=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+dd;
}

function render(data){
  const days=data.days||{};
  const today=new Date();
  today.setHours(0,0,0,0);

  // Build 53 weeks ending at today's week
  const endDay=new Date(today);
  const startDay=new Date(today);
  startDay.setDate(startDay.getDate()-startDay.getDay()-52*7);

  const weeks=[];
  let cur=new Date(startDay);
  let week=[];
  while(cur<=endDay){
    week.push(new Date(cur));
    if(cur.getDay()===6){
      weeks.push(week);
      week=[];
    }
    cur.setDate(cur.getDate()+1);
  }
  if(week.length) weeks.push(week);

  const LEFT=30, TOP=18;
  const svgW=LEFT+weeks.length*STEP+2;
  const svgH=TOP+7*STEP+2;

  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',svgW);
  svg.setAttribute('height',svgH);
  svg.setAttribute('viewBox','0 0 '+svgW+' '+svgH);

  // Day labels
  for(let i=0;i<7;i++){
    if(!DAY_LABELS[i]) continue;
    const t=document.createElementNS(ns,'text');
    t.setAttribute('x',LEFT-4);
    t.setAttribute('y',TOP+i*STEP+CELL-1);
    t.setAttribute('text-anchor','end');
    t.setAttribute('dominant-baseline','auto');
    t.textContent=DAY_LABELS[i];
    svg.appendChild(t);
  }

  // Month labels
  let lastMonth=-1;
  weeks.forEach(function(wk,wi){
    const d=wk[0];
    if(d.getMonth()!==lastMonth){
      lastMonth=d.getMonth();
      const t=document.createElementNS(ns,'text');
      t.setAttribute('x',LEFT+wi*STEP);
      t.setAttribute('y',TOP-5);
      t.textContent=MONTH_NAMES[d.getMonth()];
      svg.appendChild(t);
    }
  });

  // Cells
  const tooltip=document.getElementById('tooltip');
  weeks.forEach(function(wk,wi){
    wk.forEach(function(d){
      const dow=d.getDay();
      const key=dateKey(d);
      const secs=days[key]||0;
      const lvl=levelFor(secs);
      const colors=['var(--cell-empty)','var(--cell-l1)','var(--cell-l2)','var(--cell-l3)','var(--cell-l4)'];

      const r=document.createElementNS(ns,'rect');
      r.setAttribute('x',LEFT+wi*STEP);
      r.setAttribute('y',TOP+dow*STEP);
      r.setAttribute('width',CELL);
      r.setAttribute('height',CELL);
      r.setAttribute('rx',2);
      r.setAttribute('ry',2);
      r.style.fill=colors[lvl];
      r.style.cursor='pointer';

      r.addEventListener('mouseenter',function(e){
        tooltip.textContent=fmtTime(secs)+' on '+fmtDate(d);
        tooltip.classList.add('show');
      });
      r.addEventListener('mousemove',function(e){
        tooltip.style.left=(e.clientX+12)+'px';
        tooltip.style.top=(e.clientY-30)+'px';
      });
      r.addEventListener('mouseleave',function(){
        tooltip.classList.remove('show');
      });

      svg.appendChild(r);
    });
  });

  document.getElementById('graph').appendChild(svg);

  // Stats
  const statsEl=document.getElementById('stats');
  const statItems=[
    {label:'Days read',val:data.totalDays},
    {label:'Current streak',val:data.currentStreak+' days'},
    {label:'Longest streak',val:data.longestStreak+' days'},
    {label:'Books tracked',val:data.booksWithTime},
  ];
  statsEl.innerHTML=statItems.map(function(s){
    return '<div class="stat"><span class="val">'+s.val+'</span> '+s.label+'</div>';
  }).join('');

  // Legend
  const legendEl=document.getElementById('legend');
  const labels=['Less','','','','More'];
  legendEl.innerHTML='<span>Less</span>';
  for(let i=0;i<5;i++){
    const colors=['var(--cell-empty)','var(--cell-l1)','var(--cell-l2)','var(--cell-l3)','var(--cell-l4)'];
    legendEl.innerHTML+='<div class="legend-cell" style="background:'+colors[i]+'" title="'+
      ['No reading','< 15m','15–30m','30–60m','60m+'][i]+'"></div>';
  }
  legendEl.innerHTML+='<span>More</span>';
}

// Build absolute API URL so the fetch works inside Notion's sandboxed iframe
var baseUrl=params.get('base')||location.origin||'https://pushreadingprogresstonotion.vercel.app';
var apiUrl=params.get('api')||(baseUrl+'/api/heatmap_data');

fetch(apiUrl,{mode:'cors',cache:'no-cache'})
  .then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  })
  .then(function(data){
    if(data.error) throw new Error(data.error);
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
    render(data);
  })
  .catch(function(err){
    document.getElementById('loading').style.display='none';
    var el=document.getElementById('error');
    el.style.display='block';
    el.textContent='Failed to load data: '+err.message;
  });

})();
</script>
</body>
</html>
